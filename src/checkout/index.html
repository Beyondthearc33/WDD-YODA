<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="/css/style.css" />

    <script src="/js/checkout.js" type="module" defer></script>
  </head>

  <body>
    <header class="divider"></header>

    <main class="divider">
      <section class="products">
        <h2>Review & Place your Order</h2>
      </section>
    </main>

    <form action="/" method="POST" id="checkout-form">
      <fieldset>
        <legend>Shipping</legend>
        <label for="fname">First Name</label>
        <input type="text" name="fname" id="fname" required />
        <label for="lname">Last Name</label>
        <input type="text" name="lname" id="lname" required />
        <label for="street">Street</label>
        <input type="text" name="street" id="street" required />
        <label for="city">City</label>
        <input type="text" name="city" id="city" required />
        <label for="state">State</label>
        <input type="text" name="state" id="state" required />
        <label for="zip">Zip</label>
        <input type="text" name="zip" id="zip" pattern="^[0-9]{5}$" required />
      </fieldset>
      <fieldset>
        <legend>Payment</legend>
        <label for="cardNumber">Card Number</label>
        <input
          type="text"
          name="cardNumber"
          id="cardNumber"
          pattern="^[0-9]{16}$"
          required
        />
        <label for="expiration">Expiration</label>
        <input
          type="text"
          name="expiration"
          id="expiration"
          pattern="^(0[1-9]|1[0-2])\/\d{2}$"
          required
        />
        <label for="code">Security Code</label>
        <input
          type="number"
          name="code"
          id="code"
          minlength="3"
          maxlength="4"
          required
        />
      </fieldset>
      <fieldset class="order-summary">
        <legend>Order Summary</legend>
        <div>
          <p>Item Subtotal (<span id="item-count"></span>)</p>
          <p id="item-subtotal">$</p>
        </div>
        <div>
          <p>Shipping Estimate</p>
          <p id="shipping">$</p>
        </div>
        <div>
          <p>Tax</p>
          <p id="tax">$</p>
        </div>
        <div>
          <p><b>Order Total</b></p>
          <p id="orderTotal">$</p>
        </div>
      </fieldset>

      <button type="submit">Checkout</button>
    </form>

    <footer></footer>
  </body>
</html>
